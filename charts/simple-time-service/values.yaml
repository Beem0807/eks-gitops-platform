fullnameOverride: simple-time-service

replicaCount: 2

image:
  repository: docker.io/nabeemdev/simple-time-service
  tag: v1
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  annotations: {}

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

livenessProbe:
  path: /health
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  path: /health
  initialDelaySeconds: 3
  periodSeconds: 5

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

serviceAccount:
  create: false
  name: ""
  annotations: {}

hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUAverageUtilization: 70
  scaleDown:
    stabilizationWindowSeconds: 300  # wait 5m before scaling down
    pods: 1                          # remove at most 1 pod per period
    periodSeconds: 60
  scaleUp:
    stabilizationWindowSeconds: 0    # scale up immediately
    pods: 2                          # add at most 2 pods per period
    periodSeconds: 30

networkPolicy:
  enabled: false

pdb:
  enabled: true
  minAvailable: 1

serviceMonitor:
  enabled: false
  interval: 30s
  path: /metrics
  labels: {}

podAnnotations: {}

nodeSelector: {}

tolerations: []

affinity: {}