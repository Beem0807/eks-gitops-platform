{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "simple-time-service.fullname" . }}
  labels:
    {{- include "simple-time-service.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "simple-time-service.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic on the app port from any pod in the same namespace
    - from:
        - podSelector: {}
      ports:
        - port: {{ .Values.service.targetPort }}
          protocol: TCP
    # Allow Prometheus scraping from the monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: {{ .Values.service.targetPort }}
          protocol: TCP
  egress:
    # Allow DNS only - this service makes no outbound calls
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
