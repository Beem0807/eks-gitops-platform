# Fill in your Slack webhook URL and apply this secret to enable Slack alerting.
# The stack deploys without it - only the alertmanager-slack ArgoCD app will be degraded.
# Once the secret is applied, sync the app to activate Slack notifications.
#
#   cp secrets/alertmanager-config.example.yaml secrets/slack-webhook-url.yaml
#   # paste your webhook URL into secrets/slack-webhook-url.yaml
#   kubectl apply -f secrets/slack-webhook-url.yaml -n monitoring
#   argocd app sync alertmanager-slack-simple-eks
#
# slack-webhook-url.yaml is gitignored - never commit it.
apiVersion: v1
kind: Secret
metadata:
  name: slack-webhook-url
  namespace: monitoring
stringData:
  url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
