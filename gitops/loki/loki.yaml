apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: loki
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters: {}
  template:
    metadata:
      name: 'loki-{{.nameNormalized}}'
      annotations:
        argocd.argoproj.io/sync-wave: "3"
    spec:
      project: default
      source:
        repoURL: https://grafana-community.github.io/helm-charts
        chart: loki
        targetRevision: 6.56.1
        helm:
          releaseName: loki
          values: |
            deploymentMode: SingleBinary

            loki:
              auth_enabled: false
              commonConfig:
                replication_factor: 1
              schemaConfig:
                configs:
                  - from: "2024-01-01"
                    store: tsdb
                    object_store: filesystem
                    schema: v13
                    index:
                      prefix: loki_index_
                      period: 24h
              storage:
                type: filesystem
              rulerConfig: {}
              containerSecurityContext:
                readOnlyRootFilesystem: false

            singleBinary:
              replicas: 1
              persistence:
                enabled: false
              extraVolumes:
                - name: loki-data
                  emptyDir: {}
              extraVolumeMounts:
                - name: loki-data
                  mountPath: /var/loki
            
            ruler:
              enabled: false

            backend:
              replicas: 0

            read:
              replicas: 0

            write:
              replicas: 0

            chunksCache:
              enabled: false

            resultsCache:
              enabled: false

            gateway:
              enabled: true

            lokiCanary:
              enabled: false

            test:
              enabled: false

            monitoring:
              serviceMonitor:
                enabled: true
      destination:
        server: '{{.server}}'
        namespace: logging
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true