apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: alertmanager-slack
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: eks-gitops-platform
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/component: alerting
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters: {}
  template:
    metadata:
      name: 'alertmanager-slack-{{.nameNormalized}}'
      annotations:
        argocd.argoproj.io/sync-wave: "4"
      labels:
        app.kubernetes.io/part-of: eks-gitops-platform
        app.kubernetes.io/managed-by: argocd
        app.kubernetes.io/component: alerting
    spec:
      project: default
      source:
        repoURL: https://github.com/Beem0807/eks-gitops-platform.git
        targetRevision: main
        path: charts/raw
        helm:
          releaseName: alertmanager-slack
          values: |
            resources:
              - apiVersion: monitoring.coreos.com/v1alpha1
                kind: AlertmanagerConfig
                metadata:
                  name: slack
                  namespace: monitoring
                spec:
                  route:
                    receiver: slack
                    groupBy: [alertname, namespace]
                    groupWait: 30s
                    groupInterval: 5m
                    repeatInterval: 4h
                    matchers:
                      - name: notify
                        matchType: =
                        value: slack
                  receivers:
                    - name: slack
                      slackConfigs:
                        - apiURL:
                            name: slack-webhook-url
                            key: url
                          channel: '#alerts-test'
                          sendResolved: true
                          title: >-
                            [{{ `{{` }} .Status | toUpper {{ `}}` }}] {{ `{{` }} .CommonLabels.alertname {{ `}}` }}
                          text: >-
                            {{ `{{` }} range .Alerts {{ `}}` }}
                            *Summary:* {{ `{{` }} .Annotations.summary {{ `}}` }}
                            *Description:* {{ `{{` }} .Annotations.description {{ `}}` }}
                            *Severity:* {{ `{{` }} .Labels.severity {{ `}}` }}
                            {{ `{{` }} end {{ `}}` }}
      destination:
        server: '{{.server}}'
        namespace: monitoring
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
