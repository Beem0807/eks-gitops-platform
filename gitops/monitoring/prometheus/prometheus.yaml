apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: prometheus
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: eks-gitops-platform
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/component: monitoring
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters: {}
  template:
    metadata:
      name: 'prometheus-{{.nameNormalized}}'
      labels:
        app.kubernetes.io/part-of: eks-gitops-platform
        app.kubernetes.io/managed-by: argocd
        app.kubernetes.io/component: monitoring
    spec:
      project: default
      source:
        repoURL: https://prometheus-community.github.io/helm-charts
        chart: kube-prometheus-stack
        targetRevision: 82.18.0
        helm:
          releaseName: prometheus
          values: |
            grafana:
              enabled: true

            alertmanager:
              enabled: true
              alertmanagerSpec:
                alertmanagerConfigSelector: {}
                alertmanagerConfigNamespaceSelector: {}
                alertmanagerConfigMatcherStrategy:
                  type: None

            # kube-scheduler and kube-controller-manager are managed by AWS on EKS
            # and are not exposed for Prometheus scraping — disable these rules to avoid noise
            kubeScheduler:
              enabled: false
            kubeControllerManager:
              enabled: false

            defaultRules:
              rules:
                kubeSchedulerAlerting: false
                kubeControllerManager: false

            prometheus:
              prometheusSpec:
                retention: 7d
                serviceMonitorSelectorNilUsesHelmValues: false

            prometheusOperator:
              tls:
                enabled: false
              admissionWebhooks:
                enabled: false
                patch:
                  enabled: false
      destination:
        server: '{{.server}}'
        namespace: monitoring
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true