apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: fluent-bit
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: eks-gitops-platform
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/component: logging
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters: {}
  template:
    metadata:
      name: 'fluent-bit-{{.nameNormalized}}'
      annotations:
        argocd.argoproj.io/sync-wave: "4"
      labels:
        app.kubernetes.io/part-of: eks-gitops-platform
        app.kubernetes.io/managed-by: argocd
        app.kubernetes.io/component: logging
    spec:
      project: default
      source:
        repoURL: https://fluent.github.io/helm-charts
        chart: fluent-bit
        targetRevision: 0.48.9
        helm:
          releaseName: fluent-bit
          values: |
            kind: DaemonSet

            serviceMonitor:
              enabled: true

            config:
              service: |
                [SERVICE]
                    Daemon Off
                    Flush 1
                    Log_Level info
                    Parsers_File parsers.conf
                    HTTP_Server On
                    HTTP_Listen 0.0.0.0
                    HTTP_Port 2020

              inputs: |
                [INPUT]
                    Name tail
                    Path /var/log/containers/*.log
                    multiline.parser docker, cri
                    Tag kube.*
                    Mem_Buf_Limit 10MB
                    Skip_Long_Lines On
                    Refresh_Interval 5

              filters: |
                [FILTER]
                    Name kubernetes
                    Match kube.*
                    Kube_Tag_Prefix kube.var.log.containers.
                    Merge_Log On
                    Keep_Log Off
                    K8S-Logging.Parser On
                    K8S-Logging.Exclude Off

              outputs: |
                [OUTPUT]
                    Name loki
                    Match kube.*
                    Host loki-gateway.logging.svc.cluster.local
                    Port 80
                    Uri /loki/api/v1/push
                    Labels job=fluent-bit, namespace=$kubernetes['namespace_name'], pod=$kubernetes['pod_name'], container=$kubernetes['container_name']
                    line_format json

            daemonSetVolumes:
              - name: varlog
                hostPath:
                  path: /var/log
              - name: containers
                hostPath:
                  path: /var/lib/docker/containers
              - name: pods
                hostPath:
                  path: /var/log/pods

            daemonSetVolumeMounts:
              - name: varlog
                mountPath: /var/log
              - name: containers
                mountPath: /var/lib/docker/containers
                readOnly: true
              - name: pods
                mountPath: /var/log/pods
                readOnly: true
      destination:
        server: '{{.server}}'
        namespace: logging
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true